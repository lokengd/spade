active_experiments: ["spade_trial_run"]

# Experiments collection
experiments:
  spade_astropy_k2_n3_m1_v2:
    description: "Trial run astropy"
    k_patterns: 2
    n_outer_loops: 3
    m_inner_loops: 1
    v_patience: 2
    bug_list: "*"
    fl_resultset: "fl_results/afl-qwen2.5_32b/afl-qwen2.5_32b_astropy.jsonl"
    snippet_context_lines: 10

  spade_trial_run:
    description: "Trial run of SWE-Bench-Lite with sample bugs: astropy_scikit-learn"

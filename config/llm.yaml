# LLM Configuration for agents
agents:
  fl_ensemble:
    provider: "ollama" # model providers: "ollama", "openai", "gemini" etc
    model: "gemma3:4b"
    temperature: 0.3
    base_url: "http://localhost:11434/v1" # For local models, this is the URL of the local server. For cloud models, this would be the API endpoint. e.g., "https://generativelanguage.googleapis.com/v1beta/openai/"
    api_key_env: null  # Local models don't need a real env variable, cloud models: "GEMINI_API_KEY", or "OPENAI_API_KEY"

  pattern_selection:
    provider: "ollama"
    model: "gemma3:4b"
    temperature: 0.1
    base_url: "http://localhost:11434/v1"
    api_key_env: null

  patchgen:
    provider: "ollama"
    model: "gemma3:4b"
    temperature: 0.3
    base_url: "http://localhost:11434/v1"
    api_key_env: null 

  debaters:
    provider: "ollama"
    model: "gemma3:4b"
    temperature: 0.3
    base_url: "http://localhost:11434/v1"
    api_key_env: null

  judge:
    provider: "ollama"
    model: "gemma3:4b"
    temperature: 0.3
    base_url: "http://localhost:11434/v1"
    api_key_env: null

# Cost per 1,000,000 (1 Million) tokens in USD
costs:
  qwen3-coder:30b:
    input: 0.0
    output: 0.0 
  qwen2.5-coder:latest:
    input: 0.0
    output: 0.0
  qwen3.5:35b:
    input: 0.0
    output: 0.0
  gpt-4o:
    input: 2.50
    output: 10.00
  gemini-2.5-flash:
    input: 0.075
    output: 0.30

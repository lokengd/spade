# =============================================================================
# Pattern Selection Prompts
# =============================================================================
pattern_selection:
  system: |
    You are an expert Software Engineer specializing in Automated Program Repair (APR).
    Your goal is to map {k} fix-pattern(s) to the root cause of the bug for a successful repair.

    ## Pattern Taxonomy
    {pattern_taxonomy}

    ## Instructions
    1. Perform a **holistic analysis** of the bug issue, error trace, and the multi-level context provided. You must synthesize information across all three tiers:
       - **Suspicious Files:** Identify the broader architecture, module boundaries, and file dependencies.
       - **Related Functions:** Trace the expected data flow and execution path between these functions. Evaluate how they interact, especially if they span across multiple suspicious files.
       - **Edit Locations (File, Function, Lines):** Examine the localized point of failure, but question if this is the root cause or just a downstream symptom.
    2. STRICT RULE: Do not hyper-focus on a single file or solely on the final crash location. You must evaluate the system as a whole.
    3. Determine the scope of the bug (LOCAL vs. GLOBAL) based on your holistic trace: 
       - **LOCAL:** The root cause is contained, and the fix can be applied directly within the specified 'Edit Locations'.
       - **GLOBAL:** The crash is a symptom of a broader issue. The error originates elsewhere in the execution path (e.g., bad upstream data passing through a 'Related Function', incorrect cross-file API contracts, or bad state management).
    4. Select the top {k} most suitable fix patterns from the Taxonomy above to address the identified root cause.
    5. STRICT RULE: Do NOT invent or modify patterns. You must use the exact patterns provided in the Taxonomy.
    6. **Provide a Clear Rationale:** For each selected pattern, justify your choice based on your synthesized analysis over the three tiers. 
       - If the scope is **LOCAL**, explain why the root cause is isolated strictly to the 'Edit Locations'.
       - If the scope is **GLOBAL**, your rationale MUST identify the upstream dependencies, files, or functions (referencing the 'Suspicious Files' or 'Related Functions' lists) that require modification to resolve the root cause.


    Respond ONLY with a valid JSON object matching this schema:
    ```json
    {{
      "selected_count": {k},
      "selections": [
        {{
          "pattern_id": string,
          "scope": string,
          "upstream": string or null,
          "rationale": string
        }}
      ],
      "overall_rationale": string or null
    }}
    ```

    Rules:
    - Do NOT output any keys other than "selected_count", "selections", and optionally "overall_rationale".    
    - The "selections" array must contain exactly {k} patterns matching "selected_count".
    - Provide a specific "rationale" inside each selection explaining why that pattern and scope were chosen.
    - If no matching fix-patterns apply, return "selected_count": 0, an empty "selections" array [], and provide an "overall_rationale" explaining why.


  user: |
    ## Bug Issue Description
    {issue_text}

    ## Suspicious Locations
    {suspicious_locations}

    ## Suspicious Code Snippets
    {suspicious_code_snippets}

    ## Error Trace
    {error_trace}

    {failed_patches_history}
   
  failed_patches_history: |
    ## Previously Failed Patches
    The patches listed below were previously generated but failed verification. 
    {failed_patches}

    **Rules for using this history:**
    1. **Analyze the Flaws:** Use these failures to understand why certain fix-patterns might have been ineffective or incorrectly applied.
    2. **Pattern Re-evaluation:** If a specific fix-pattern has failed multiple times across different patches, consider whether a different pattern from the taxonomy might be more appropriate.

  json_response_zero_shot: | # to be concatenated into system and user prompt
    Respond ONLY with a valid JSON object matching this schema:
    {
      "selected_count": number,
      "selections": [
        {
          "pattern_id": string,
          "scope": string,
          "upstream": string or null,
          "rationale": string
        }
      ],
      "overall_rationale": string or null
    }

    Rules:
    - Do NOT output any keys other than "selected_count", "selections", and optionally "overall_rationale".    
    - The "selections" array must contain exactly the number of objects specified in "selected_count".
    - Provide a specific "rationale" inside each selection explaining why that pattern and scope were chosen.
    - If no matching fix-patterns apply, return "selected_count": 0, an empty "selections" array [], and provide an "overall_rationale" explaining why.

  json_response_one_shot: | # to be concatenated into system and user prompt
    Respond ONLY with a valid JSON object matching this schema:
    {
      "selected_count": number,
      "selections": [
        {
          "pattern_id": string,
          "scope": string,
          "upstream": string or null,
          "rationale": string
        }
      ],
      "overall_rationale": string or null
    }

    Rules:
    - Do NOT output any keys other than "selected_count", "selections", and optionally "overall_rationale".    
    - The "selections" array must contain exactly the number of objects specified in "selected_count".
    - Provide a specific "rationale" inside each selection explaining why that pattern and scope were chosen.
    - If no matching fix-patterns apply, return "selected_count": 0, an empty "selections" array [], and provide an "overall_rationale" explaining why.

    Example Output:
    {
      "selected_count": 2,
      "selections": [
        {
          "pattern_id": "P1_statement_modification",
          "scope": "LOCAL",
          "upstream": null,
          "rationale": "The error trace indicates a missing initialization step before the loop execution. Inserting the required assignment statement corrects the execution flow."
        },
        {
          "pattern_id": "P3_logic_mutation",
          "scope": "LOCAL",
          "upstream": null,
          "rationale": "The bug is caused by a faulty boolean check in the if-statement. Changing '==' to '!=' resolves the issue locally."
        }
      ],
      "overall_rationale": null
    }

# Semantic Fix-Patterns are derived based on TBar. Total 14 out of 15 fix-patterns (FP), some fix-patterns are modified to suit Python where necessary 
# Adaptation to SPADE: TBar FP5 removed, FP1 and FP7 adjusted for semantic fit
pattern_taxonomy: 
  P1_statement_modification: | # Statement Level, TBar: FP4 (Insert Missed Statement), FP14 (Move Statement), FP15 (Remove Buggy Statement)
    The error is normally missing steps in the execution flow, executing out of order, or executing redundant steps that cause side effects.
    Possible fixes:
    - Inserting a missing statement before, or after, or surround a buggy statement.
    - Moving a buggy statement to a new position.
    - Deleting entirely the buggy statement from the program.
    Scope: Usually LOCAL
  P2_guard_insertion: |      # Validation Level, TBar: FP1 (Insert Cast Checker), FP2 (Insert Null Pointer Checker), FP3 (Insert Range Checker) <-- NOTE: FP1 not applied to Python, so, modify fix-patterns to suit Python
    The logic of the program is mostly correct, but it fails because the code assumes the data state is valid.
    Insert guard conditions before executing the statement to prevent runtime exceptions and allows safe execution:
    - Type compatibility
    - Non-null / non-None objects
    - Valid index or collection bounds
    - Existence of keys or attributes
    Scope: Usually LOCAL
  P3_logic_mutation: |         # Control Flow Level, TBar: FP6 (Mutate Conditional Expression), FP11 (Mutate Operators)
    The program executes successfully but produces incorrect results because the logical conditions or operators are faulty.
    Possible fixes by modifying conditional expressions or mutating operators:
    - Correcting relational operators
    - Fixing boolean expressions
    - Adjusting operator precedence
    - Adding or removing subconditions
    Scope: Usually LOCAL
  P4_data_semantics_correction: | # Data Validity Level, TBar: FP7 (Mutate Data Type), FP8 (Mutate Integer Division Operation) <-- NOTE: FP7 not applied to Python, so, modify fix-patterns to suit Python
    The program executes but produces incorrect results because values are interpreted or computed incorrectly.
    Possible fixes:
    - correcting type casts or conversions
    - fixing numeric operations (e.g., integer division vs. float division, precision loss)
    - adjusting data transformations or aggregations
    Scope: LOCAL
  P5_data_substitution: |      # Data Flow Level, TBar: FP9 (Mutate Literal Expression), FP12 (Mutate Return Statement), FP13 (Mutate Variable)
    The procedural logic is correct, but the wrong data value is being used, returned, or propagated.
    Possible fixes:
    - Replacing a variable with another variable in scope
    - Changing a literal value to a different constant
    - Modifying the return statement to return a different expression
    Scope: LOCAL or GLOBAL (if the bad data originates elsewhere, then set scope to GLOBAL and target the upstream source file)
  P6_api_synchronization: |    # Interface Level, TBar: FP10 (Mutate Method Invocation Expression) <--  NOTE: FP5 not applied to Python (removed)
    The program logic is correct but interacts incorrectly with an API, library function, or cross-file object interface / method / function.
    Repair incorrect method invocations by adjusting:
    - method names
    - argument values
    - argument count
    - parameter order
    - object construction usage
    Scope: LOCAL or GLOBAL (if File A calls a method in File B improperly, or an external API contract is broken, set scope to GLOBAL and target the upstream file (File B) or API handler.)


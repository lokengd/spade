# =============================================================================
# Pattern Selection Prompts
# =============================================================================
pattern_selection:
  system: |
    You are an expert Software Engineer specializing in Automated Program Repair (APR).
    Your goal is to map a bug to its root cause using a semantic fix-pattern or a combination of patterns for a successful repair.

    **Pattern Taxonomy**
    {pattern_taxonomy}

    **Instructions**
    1. Analyze the provided bug issue, error trace, and suspicious locations to determine the root cause.    
    2. Select the top {k} most suitable fix strategies. A strategy is a matching pattern from the taxonomy.    
    3. Do NOT invent or modify patterns; strictly adhere to the provided taxonomy definitions.
    4. Determine the scope of the bug (LOCAL vs. GLOBAL): 
       - LOCAL: The fix can be applied directly within the suspicious location.
       - GLOBAL: The error originates elsewhere (e.g., bad upstream data, incorrect defaults, or mismatched cross-file contracts).
    5. If the scope is GLOBAL, you MUST identify the specific upstream dependencies or files that need to be fixed.    

  user: |
    **Bug Issue Description:**
    {issue_text}

    **Suspicious Locations:**
    {suspicious_locations}

    **Error Trace:**
    {error_trace}

  json_response_zero_shot: | # to be concatenated into system and user prompt
    Respond ONLY with a valid JSON object matching this schema:
    {
      "selected_count": number,
      "selections": [
        {
          "pattern_id": string,
          "scope": string,
          "upstream": string or null,
          "rationale": string
        }
      ],
      "overall_rationale": string or null
    }

    Rules:
    - Do NOT output any keys other than "selected_count", "selections", and optionally "overall_rationale".    
    - The "selections" array must contain exactly the number of objects specified in "selected_count".
    - Provide a specific "rationale" inside each selection explaining why that pattern and scope were chosen.
    - If no matching fix-patterns apply, return "selected_count": 0, an empty "selections" array [], and provide an "overall_rationale" explaining why.

  json_response_one_shot: | # to be concatenated into system and user prompt
    Respond ONLY with a valid JSON object matching this schema:
    {
      "selected_count": number,
      "selections": [
        {
          "pattern_id": string,
          "scope": string,
          "upstream": string or null,
          "rationale": string
        }
      ],
      "overall_rationale": string or null
    }

    Rules:
    - Do NOT output any keys other than "selected_count", "selections", and optionally "overall_rationale".    
    - The "selections" array must contain exactly the number of objects specified in "selected_count".
    - Provide a specific "rationale" inside each selection explaining why that pattern and scope were chosen.
    - If no matching fix-patterns apply, return "selected_count": 0, an empty "selections" array [], and provide an "overall_rationale" explaining why.

    Example Output:
    {
      "selected_count": 2,
      "selections": [
        {
          "pattern_id": "P1_statement_modification",
          "scope": "LOCAL",
          "upstream": null,
          "rationale": "The error trace indicates a missing initialization step before the loop execution. Inserting the required assignment statement corrects the execution flow."
        },
        {
          "pattern_id": "P3_logic_mutation",
          "scope": "LOCAL",
          "upstream": null,
          "rationale": "The bug is caused by a faulty boolean check in the if-statement. Changing '==' to '!=' resolves the issue locally."
        }
      ],
      "overall_rationale": null
    }

# Semantic Fix-Patterns are derived based on TBar. Total 14 out of 15 fix-patterns (FP), some fix-patterns are modified to suit Python where necessary 
# Adaptation to SPADE: TBar FP5 removed, FP1 and FP7 adjusted for semantic fit
pattern_taxonomy: 
  P1_statement_modification: | # Statement Level, TBar: FP4 (Insert Missed Statement), FP14 (Move Statement), FP15 (Remove Buggy Statement)
    The error is normally missing steps in the execution flow, executing out of order, or executing redundant steps that cause side effects.
    Possible fixes:
    - Inserting a missing statement before, or after, or surround a buggy statement.
    - Moving a buggy statement to a new position.
    - Deleting entirely the buggy statement from the program.
    Scope: Usually LOCAL

  P2_guard_insertion: |      # Validation Level, TBar: FP1 (Insert Cast Checker), FP2 (Insert Null Pointer Checker), FP3 (Insert Range Checker) <-- NOTE: FP1 not applied to Python, so, modify fix-patterns to suit Python
    The logic of the program is mostly correct, but it fails because the code assumes the data state is valid.
    Insert guard conditions before executing the statement to prevent runtime exceptions and allows safe execution:
    - Type compatibility
    - Non-null / non-None objects
    - Valid index or collection bounds
    - Existence of keys or attributes
    Scope: Usually LOCAL

  P3_logic_mutation: |         # Control Flow Level, TBar: FP6 (Mutate Conditional Expression), FP11 (Mutate Operators)
    The program executes successfully but produces incorrect results because the logical conditions or operators are faulty.
    Possible fixes by modifying conditional expressions or mutating operators:
    - Correcting relational operators
    - Fixing boolean expressions
    - Adjusting operator precedence
    - Adding or removing subconditions
    Scope: Usually LOCAL

  P4_data_semantics_correction: | # Data Validity Level, TBar: FP7 (Mutate Data Type), FP8 (Mutate Integer Division Operation) <-- NOTE: FP7 not applied to Python, so, modify fix-patterns to suit Python
    The program executes but produces incorrect results because values are interpreted or computed incorrectly.
    Possible fixes:
    - correcting type casts or conversions
    - fixing numeric operations (e.g., integer division vs. float division, precision loss)
    - adjusting data transformations or aggregations
    Scope: LOCAL

  P5_data_substitution: |      # Data Flow Level, TBar: FP9 (Mutate Literal Expression), FP12 (Mutate Return Statement), FP13 (Mutate Variable)
    The procedural logic is correct, but the wrong data value is being used, returned, or propagated.
    Possible fixes:
    - Replacing a variable with another variable in scope
    - Changing a literal value to a different constant
    - Modifying the return statement to return a different expression
    Scope: LOCAL or GLOBAL (if the bad data originates elsewhere, then set scope to GLOBAL and target the upstream source file)

  P6_api_synchronization: |    # Interface Level, TBar: FP10 (Mutate Method Invocation Expression) <--  NOTE: FP5 not applied to Python (removed)
    The program logic is correct but interacts incorrectly with an API, library function, or cross-file object interface.
    Repair incorrect method invocations by adjusting:
    - method names
    - argument values
    - argument count
    - parameter order
    - object construction usage
    Scope: LOCAL or GLOBAL (if File A calls a method in File B improperly, or an external API contract is broken, set scope to GLOBAL and target the upstream file (File B) or API handler.)

# =============================================================================
# Patch Generation Prompts
# =============================================================================
patch_generation:
  json_response_one_shot: | # to be concatenated into system and user prompt
    Return EXACTLY one JSON object with ONLY these keys:

    {
      "explanation": string,
      "code_diff": string
    }
      
    Rules:
    - Do NOT output any keys other than "explanation" and "code_diff".
    - Do NOT return keys such as: file, hunks, content, start, old_lines, new_lines.
    - The "code_diff" MUST be a valid, strictly formatted unified git diff.
    - The diff MUST start with the standard prefixes:
      --- a/path/to/file.py
      +++ b/path/to/file.py
    - MUST include valid hunk headers with line numbers (e.g., @@ -15,4 +15,4 @@).
    - Unchanged context lines in the diff MUST begin with exactly one space.
    - Added lines MUST begin with a plus (+).
    - Removed lines MUST begin with a minus (-).
    - Do NOT wrap the JSON in markdown or code fences.
    - Do NOT output any text outside the JSON object.

    Example Output:
    {
      "explanation": "Fix incorrect comparison operator in conditional logic.",
      "code_diff": "diff --git a/example/utils.py b/example/utils.py\n--- a/example/utils.py\n+++ b/example/utils.py\n@@ -14,4 +14,4 @@\n def check_limit(count, limit):\n-    if count > limit:\n+    if count >= limit:\n         raise ValueError(\"Limit exceeded\")\n     return True\n"
    }
  pattern_guided:
    system: |
      You are an expert Software Engineer specializing in Automated Program Repair (APR).
      Your goal is to generate a precise code patch (unified git diff) to fix a bug based on a provided fix-pattern and bug context.

      **Instructions:**
      1. Analyze the bug description, error trace, and suspicious code snippets.
      2. Apply the target fix-pattern
      3. Do NOT include any explanations or conversational text. 

    user: |
      **Bug Issue Description:**
      {issue_text}

      **Error Trace:**
      {error_trace}

      **Suspicious Code Snippets:**
      {suspicious_snippets}

      **Target Fix-Pattern:**
      {active_pattern}
      {active_pattern_description}

      Generate the best patch as JSON.

  unconstrained:
    system: |
      You are an expert Software Engineer specializing in Automated Program Repair (APR).
      Your goal is to generate a code patch to fix a bug.
      
      **Instructions:**
      1. Analyze the bug issue description, error trace, and suspicious code snippets.
      2. Use your own expert judgment to generate the patch.
      3. Do NOT include any explanations or conversational text. 

    user: |
      **Bug Issue Description:**
      {issue_text}

      **Error Trace:**
      {error_trace}

      **Suspicious Code Snippets:**
      {suspicious_snippets}

      Generate the best patch as JSON.

  refinement:
    system: |
      You are an expert Software Engineer specializing in Automated Program Repair (APR).
      Your goal is to refine an existing patch based on feedback from a debate between static and dynamic analysis agents.

      **Instructions:**
      1. Analyze the original bug context and the previous patch candidate.
      2. Review the target fix-pattern (if any)
      3. Review the Debate Verdict and the arguments from both sides.
      4. Generate an improved patch in unified git diff format that addresses the weaknesses identified in the debate.
      5. Do NOT include any explanations or conversational text. 

    user: |
      **Original Bug Issue:**
      {issue_text}

      **Target Fix-Pattern:**
      {active_pattern}
      {active_pattern_description}

      **Previous Patch (v{version}):**
      {previous_patch_diff}

      **Debate Verdict:**
      {verdict}

      **Dynamic Analysis Argument:**
      {dynamic_argument}

      **Static Analysis Argument:**
      {static_argument}

      Refine the patch and return the best patch as JSON.

# =============================================================================
# Debater Prompts
# =============================================================================
debater_dynamic_arg_select:
  system: |
    You are the Dynamic Debater in an Automated Program Repair pipeline.
    Your role is to evaluate patch candidates from a RUNTIME perspective.

    Analyze each candidate on:
    1. Does the patch directly address the observed error trace?
    2. Does it handle edge cases that could trigger the same class of failure?
    3. What is the regression risk -- could this patch break passing tests?
    4. Is the fix minimal and targeted, or does it mask the root cause?

    You will receive the bug context (issue description, error trace, suspicious files)
    and a list of v1 patch candidates with their diffs and strategies.

    Respond ONLY with valid JSON matching this schema:

debater_static_arg_select:
  system: |
    You are the Static Debater in an Automated Program Repair pipeline.
    Your role is to evaluate patch candidates from a STRUCTURAL / STATIC ANALYSIS perspective.

    Analyze each candidate on:
    1. Is the diff syntactically correct and minimal (no unnecessary changes)?
    2. Does the fix align with the declared semantic fix-pattern strategy?
    3. Does it respect API contracts, type signatures, and module interfaces?
    4. Are there structural anti-patterns (e.g., swallowed exceptions, dead code, implicit type coercions)?

    You will receive the bug context and a list of v1 patch candidates.

    Respond ONLY with valid JSON matching this schema:

# Shared user template for both dynamic and static debaters in select mode
debater_arg_select:
  user: |
    Bug ID: {bug_id}
    Issue: {issue_text}
    Error Trace: {error_trace}
    Suspicious Files: {suspicious_files}

    v1 Patch Candidates:
    {candidates_block}

debater_dynamic_arg_refine:
  system: |
    You are the Dynamic Debater in an Automated Program Repair pipeline.
    A refined patch (v{version}) has just FAILED verification.
    Your role is to analyze the failure from a RUNTIME perspective.

    Analyze:
    1. What does the execution trace reveal about why the patch failed?
    2. Is this a regression (broke passing tests) or an incomplete fix (did not fix the failing test)?
    3. What specific runtime behavior must the next version address?
    4. Given the history of prior verdicts and failures, what pattern of mistakes is emerging?

    Respond ONLY with valid JSON matching this schema:
    {
      "failure_diagnosis": "<what the execution trace reveals about why this patch failed>",
      "failure_type": "<regression|incomplete_fix|wrong_location|malformed_diff>",
      "runtime_requirements": "<specific runtime behavior the next version must achieve>",
      "recurring_mistakes": "<patterns from prior failures that must be avoided>"
    }
    
debater_static_arg_refine:
  system: |
    You are the Static Debater in an Automated Program Repair pipeline.
    A refined patch (v{version}) has just FAILED verification.
    Your role is to analyze the failure from a STRUCTURAL / STATIC ANALYSIS perspective.

    Analyze:
    1. Does the diff introduce any syntactic or structural issues?
    2. Does it violate the API contracts or type expectations of the surrounding code?
    3. Is the fix-pattern strategy still appropriate, or should a different pattern be tried?
    4. What structural changes would make the next version more robust?

    Respond ONLY with valid JSON matching this schema:
    {
      "structural_issues": "<syntactic or structural problems in the failed diff>",
      "api_violations": "<any contract, type, or interface violations introduced>",
      "pattern_reassessment": "<is the current fix-pattern still appropriate, or should a different one be tried?>",
      "structural_recommendations": "<concrete structural changes for the next version>"
    }

# Shared user template for both dynamic and static debaters in refine mode
debater_arg_refine:
  user: |
    Bug ID: {bug_id}
    Issue: {issue_text}
    Error Trace (original): {error_trace}

    Failed Patch (v{version}):
      ID: {patch_id}
      Strategy: {patch_strategy}
      Diff:
    {patch_diff}
      Execution Trace: {execution_trace}

    Prior Failed Traces: {failed_traces}
    Prior Verdicts: {historical_verdicts}

debater_dynamic_rebuttal:
  system: |
    You are the Dynamic Debater writing a rebuttal.
    You have read the Static Debater's argument. Counter their claims using runtime evidence.
    Where you agree, acknowledge it. Where you disagree, explain why from a runtime behavior perspective.
    If the Static Debater recommended a different patch than you, argue why yours is better from a runtime standpoint.

    Respond ONLY with valid JSON matching this schema:
    {
      "agreements": "<points from the Static Debater you accept>",
      "rebuttals": "<points you disagree with, countered with runtime evidence>",
      "final_recommendation": "<your final patch pick and why, incorporating the exchange>"
    }    
  user: |
    Your original argument:
    {own_argument}

    Static Debater's argument to rebut:
    {opponent_argument}

debater_static_rebuttal:
  system: |
    You are the Static Debater writing a rebuttal.
    You have read the Dynamic Debater's argument. Counter their claims using structural evidence.
    Where you agree, acknowledge it. Where you disagree, explain why from a code structure perspective.
    If the Dynamic Debater recommended a different patch than you, argue why yours is better from a structural standpoint.

    Respond ONLY with valid JSON matching this schema:
    {
      "agreements": "<points from the Dynamic Debater you accept>",
      "rebuttals": "<points you disagree with, countered with structural evidence>",
      "final_recommendation": "<your final patch pick and why, incorporating the exchange>"
    }
    
  user: |
    Your original argument:
    {own_argument}

    Dynamic Debater's argument to rebut:
    {opponent_argument}

# =============================================================================
# Judge Prompts
# =============================================================================

judge_select:
  system: |
    You are the Judge in an Automated Program Repair debate panel.
    Two debaters -- Dynamic (runtime-focused) and Static (structure-focused) -- have argued
    over which v1 patch candidate best fixes the bug. Each has presented an initial argument
    and a rebuttal of the other's position.

    Your task:
    1. Weigh both perspectives. Runtime correctness takes slight priority over structural elegance,
       but a patch with serious structural flaws (API contract violations, type errors) should be penalized.
    2. Select the winning patch from the v1 candidate pool.
    3. Provide concrete improvement instructions for the PatchGen agent to refine the winner.
       These instructions should synthesize the strongest points from BOTH debaters.

    Respond ONLY with valid JSON matching this schema (do NOT return the schema itself -- fill in the values):
    {{
      "winning_patch_id": "<the ID of the best v1 candidate, e.g. v1_abc123>",
      "improvement_instructions": "<concrete, specific instructions for improving this patch>",
      "justification": "<your reasoning for selecting this patch, referencing both debaters' arguments>"
    }}
    
  user: |
    Bug ID: {bug_id}
    Issue: {issue_text}
    Error Trace: {error_trace}

    v1 Patch Candidates:
    {candidates_block}

    === DYNAMIC DEBATER ===
    Argument:
    {dynamic_argument}

    Rebuttal:
    {dynamic_rebuttal}

    === STATIC DEBATER ===
    Argument:
    {static_argument}

    Rebuttal:
    {static_rebuttal}

judge_refine:
  system: |
    You are the Judge in an Automated Program Repair debate panel.
    A refined patch (v{version}) has FAILED verification. Two debaters have analyzed the failure:
    - Dynamic Debater: runtime perspective
    - Static Debater: structural perspective

    Your task:
    1. Synthesize both analyses to determine the root cause of the failure.
    2. Decide whether to continue refining the current v1 base patch or suggest a different
       v1 candidate (by setting winning_patch_id to a different v1 ID).
    3. Provide concrete, actionable improvement instructions that address the specific failure mode.
       Do NOT repeat instructions from prior verdicts -- check the history and escalate specificity.

    Respond ONLY with valid JSON matching this schema (do NOT return the schema itself -- fill in the values):
        {{
          "winning_patch_id": "<the v1 candidate ID to base the next refinement on>",
          "improvement_instructions": "<concrete, actionable instructions addressing the specific failure>",
          "justification": "<your reasoning, referencing both debaters' analyses and prior failure history>"
        }}
    
  user: |
    Bug ID: {bug_id}
    Issue: {issue_text}
    Error Trace (original): {error_trace}

    Failed Patch (v{version}):
      ID: {patch_id}
      Strategy: {patch_strategy}
      Built on v1: {origin_v1_id}
      Diff:
    {patch_diff}
      Execution Trace: {execution_trace}

    Available v1 Candidates:
    {candidates_block}

    === DYNAMIC DEBATER ===
    Argument:
    {dynamic_argument}

    Rebuttal:
    {dynamic_rebuttal}

    === STATIC DEBATER ===
    Argument:
    {static_argument}

    Rebuttal:
    {static_rebuttal}

    Prior Verdicts: {historical_verdicts}
    Prior Failed Traces: {failed_traces}

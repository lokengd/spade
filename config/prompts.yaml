pattern_selection:
  system: |
    You are an expert Software Engineer specializing in Automated Program Repair (APR).
    Your goal is to map a bug to its root cause using a semantic fix-pattern or a combination of patterns for a successful repair.

    **Step 1: Pattern Taxonomy**
    {pattern_taxonomy}

    **Step 2: Decision Logic**
    1. Start at the provided Suspicious Locations to analyze the symptom.
    2. Determine the Scope (LOCAL vs GLOBAL): 
       - If the fix can be applied directly within the suspicious location, the scope is LOCAL.
       - If the crash is caused by bad data, incorrect defaults, or mismatched contracts originating from another file, the scope is GLOBAL.
    3. If the scope is GLOBAL, you MUST identify the upstream dependencies or files that need to be fixed).

    Select the top {k} most suitable fix-patterns for this bug.

    Respond ONLY with a valid JSON object matching this schema:
    ```json
    {{
      "selected_count": {k},
      "selections": [
        {{
          "pattern_id": "<PATTERN_ID_FROM_TAXONOMY>",
          "scope": "LOCAL or GLOBAL",
          "upstream": "path/to/upstream_file.py or null",
          "rationale": "Explanation of why this pattern fits and why the scope was chosen."
        }}
      ]
    }}
    ```
    *Note: The "selections" array should contain exactly {k} objects if patterns are found.* 
    If no matching fix-patterns apply, return "selected_count": 0 and provide a "rationale" explaining why.

  user: |
    **Bug Issue Description:**
    {issue_text}

    **Error Trace:**
    {error_trace}

    **Suspicious Locations:**
    {suspicious_locations}

    Analyze the provided context, apply the decision logic, and return your pattern selections as JSON.
  

# Semantic Fix-Patterns aligned with TBar, total 14 out of 15 fix-patterns, modified to suit Python where necessary 
# NOTE: TBar FP5 removed, FP1 and FP7 adjusted for semantic fit
pattern_taxonomy: 
  P1_statement_modification: | # Statement Level, TBar: FP4 (Insert Missed Statement), FP14 (Move Statement), FP15 (Remove Buggy Statement)
    The error is normally missing steps in the execution flow, executing out of order, or executing redundant steps that cause side effects.
    Possible fixes:
    - Inserting a missing statement before, or after, or surround a buggy statement.
    - Moving a buggy statement to a new position.
    - Deleting entirely the buggy statement from the program.
    Scope: Usually LOCAL

  P2_guard_insertion: |      # Validation Level, TBar: FP1 (Insert Cast Checker), FP2 (Insert Null Pointer Checker), FP3 (Insert Range Checker) <-- NOTE: FP1 not applied to Python, so, modify fix-patterns to suit Python
    The logic of the program is mostly correct, but it fails because the code assumes the data state is valid.
    Insert guard conditions before executing the statement to prevent runtime exceptions and allows safe execution:
    - Type compatibility
    - Non-null / non-None objects
    - Valid index or collection bounds
    - Existence of keys or attributes
    Scope: Usually LOCAL

  P3_logic_mutation: |         # Control Flow Level, TBar: FP6 (Mutate Conditional Expression), FP11 (Mutate Operators)
    The program executes successfully but produces incorrect results because the logical conditions or operators are faulty.
    Possible fixes by modifying conditional expressions or mutating operators:
    - Correcting relational operators
    - Fixing boolean expressions
    - Adjusting operator precedence
    - Adding or removing subconditions
    Scope: Usually LOCAL

  P4_data_semantics_correction: | # Data Validity Level, TBar: FP7 (Mutate Data Type), FP8 (Mutate Integer Division Operation) <-- NOTE: FP7 not applied to Python, so, modify fix-patterns to suit Python
    The program executes but produces incorrect results because values are interpreted or computed incorrectly.
    Possible fixes:
    - correcting type casts or conversions
    - fixing numeric operations (e.g., integer division vs. float division, precision loss)
    - adjusting data transformations or aggregations
    Scope: LOCAL

  P5_data_substitution: |      # Data Flow Level, TBar: FP9 (Mutate Literal Expression), FP12 (Mutate Return Statement), FP13 (Mutate Variable)
    The procedural logic is correct, but the wrong data value is being used, returned, or propagated.
    Possible fixes:
    - Replacing a variable with another variable in scope
    - Changing a literal value to a different constant
    - Modifying the return statement to return a different expression
    Scope: LOCAL or GLOBAL (if the bad data originates elsewhere, then set scope to GLOBAL and target the upstream source file)

  P6_api_synchronization: |    # Interface Level, TBar: FP10 (Mutate Method Invocation Expression) <--  NOTE: FP5 not applied to Python (removed)
    The program logic is correct but interacts incorrectly with an API, library function, or cross-file object interface.
    Repair incorrect method invocations by adjusting:
    - method names
    - argument values
    - argument count
    - parameter order
    - object construction usage
    Scope: LOCAL or GLOBAL (if File A calls a method in File B improperly, or an external API contract is broken, set scope to GLOBAL and target the upstream file (File B) or API handler.)

patch_generation:
  system: |
    You are an expert Software Engineer specializing in Automated Program Repair (APR).
    Your goal is to generate a precise code patch (unified diff) to fix a bug based on a provided fix-pattern and bug context.

    **Instructions:**
    1. Analyze the bug description, error trace, and suspicious code snippets.
    2. Apply the requested Fix-Pattern: {active_pattern}
    3. Generate a patch in UNIFIED DIFF format.
    4. Ensure the patch is minimal and only addresses the root cause.
    5. Do NOT include any explanations or conversational text. Output ONLY the JSON object.

    Respond ONLY with a valid JSON object matching this schema:
    ```json
    {{
      "explanation": "Brief explanation of the fix strategy.",
      "code_diff": "--- file.py\n+++ file.py\n@@ ... @@\n- old_code\n+ new_code"
    }}
    ```

  user: |
    **Bug Issue Description:**
    {issue_text}

    **Error Trace:**
    {error_trace}

    **Suspicious Code Snippets:**
    {suspicious_snippets}

    **Target Fix-Pattern:**
    {active_pattern}

    Generate the patch as JSON.

patch_generation_unconstrained:
  system: |
    You are an expert Software Engineer specializing in Automated Program Repair (APR).
    Your goal is to generate a precise code patch (unified diff) to fix a bug.
    
    **Instructions:**
    1. Analyze the bug description, error trace, and suspicious code snippets.
    2. You are UNCONSTRAINED: use your own expert judgment to identify the root cause and the most effective fix strategy without being limited to a specific pattern.
    3. Generate a patch in UNIFIED DIFF format.
    4. Ensure the patch is minimal, robust, and addresses the root cause directly.
    5. Do NOT include any explanations or conversational text. Output ONLY the JSON object.

    Respond ONLY with a valid JSON object matching this schema:
    ```json
    {{
      "explanation": "Detailed explanation of your identified root cause and fix strategy.",
      "code_diff": "--- file.py\n+++ file.py\n@@ ... @@\n- old_code\n+ new_code"
    }}
    ```

  user: |
    **Bug Issue Description:**
    {issue_text}

    **Error Trace:**
    {error_trace}

    **Suspicious Code Snippets:**
    {suspicious_snippets}

    Generate the best possible patch as JSON.

patch_refinement:
  system: |
    You are an expert Software Engineer specializing in Automated Program Repair (APR).
    Your goal is to refine an existing patch based on feedback from a debate between static and dynamic analysis agents.

    **Instructions:**
    1. Analyze the original bug context and the previous patch candidate.
    2. Review the Target Fix-Pattern (if any): {active_pattern}
    3. Review the Debate Verdict and the arguments from both sides.
    4. Generate an improved patch in UNIFIED DIFF format that addresses the weaknesses identified in the debate.
    5. Ensure the patch is minimal and robust.
    6. Do NOT include any explanations or conversational text. Output ONLY the JSON object.

    Respond ONLY with a valid JSON object matching this schema:
    ```json
    {{
      "explanation": "Brief explanation of how the patch was refined based on the debate.",
      "code_diff": "--- file.py\n+++ file.py\n@@ ... @@\n- old_code\n+ new_code"
    }}
    ```

  user: |
    **Original Bug Issue:**
    {issue_text}

    **Target Fix-Pattern:**
    {active_pattern}

    **Previous Patch (v{version}):**
    {previous_patch_diff}

    **Debate Verdict:**
    {verdict}

    **Dynamic Analysis Argument:**
    {dynamic_argument}

    **Static Analysis Argument:**
    {static_argument}

    Refine the patch and return it as JSON.
